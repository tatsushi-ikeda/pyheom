# cibuildwheel config for CUDA 11.7 wheel.
#
# Usage (from pyheom/ project root):
#   module load cuda/11.7
#   bash scripts/build_wheels.sh --cuda
#
# Requirements:
#   - /opt/cuda/11.x must exist on the host (module load cuda/11.7)
#   - podman must be available
#
# The host CUDA toolkit is bind-mounted read-only into the container.
# The resulting wheel links against libcudart, libcublas, etc. from the
# target system's CUDA installation (11.7+).

[build-system]
requires = ["setuptools>=42", "wheel", "jinja2", "ninja"]
build-backend = "setuptools.build_meta"

[tool.cibuildwheel]
container-engine = { name = "podman", create-args = ["-v", "/opt/cuda/11.x:/usr/local/cuda:ro"] }
build = "cp39-* cp310-* cp311-* cp312-*"
skip  = "*-musllinux*"

before-build = "rm -rf /project/build && find /project/pyheom -name '*.so' -delete"

[tool.cibuildwheel.linux]
archs = ["x86_64"]
manylinux-x86_64-image = "quay.io/pypa/manylinux2014_x86_64"

# LIBHEOM_ENABLE_CUDA=ON: correct CMake variable name.
# CUDA_ARCH_LIST targets sm_70 (V100), sm_75 (T4), sm_80 (A100), sm_86 (A40/RTX30).
# manylinux2014 uses GCC 10.2 (devtoolset-10), compatible with CUDA 11.7 (max GCC 11).
# manylinux_2_28 uses GCC 14 which CUDA 11.7 does not support.
# CXXFLAGS disables AVX-512 in host-compiled C++ (same issue as Eigen wheel).
# PATH prepends CUDA bin while preserving cibuildwheel's Python paths via $PATH.
# libgomp excluded to avoid double-loading alongside numpy's libgomp.
# CUDA runtime libs excluded; target system's CUDA installation provides them.
repair-wheel-command = "auditwheel repair --exclude libgomp.so.1 --exclude libcuda.so.1 --exclude libcudart.so.11.0 --exclude libcublas.so.11 --exclude libcublasLt.so.11 --exclude libcusparse.so.11 --exclude libcusolver.so.11 --exclude libnvrtc.so.11.2 -w {dest_dir} {wheel}"

[tool.cibuildwheel.linux.environment]
PYHEOM_VARIANT  = "cuda117"
CMAKE_ARGS      = "-DLIBHEOM_ENABLE_CUDA=ON -DCUDA_ARCH_LIST=70;75;80;86"
CXXFLAGS        = "-mno-avx512f -mno-avx512vl -mno-avx512bw -mno-avx512dq -mno-avx512cd"
PATH            = "/usr/local/cuda/bin:$PATH"
LD_LIBRARY_PATH = "/usr/local/cuda/lib64"
